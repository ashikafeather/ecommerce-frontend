<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | IVALIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --brand-red: #b33939; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .cart-card { border: none; border-radius: 15px; transition: transform 0.2s; }
        .cart-img { width: 90px; height: 120px; object-fit: cover; border-radius: 10px; }
        .price-text { color: var(--brand-red); font-weight: 700; }
        .qty-control { background: #eee; border-radius: 8px; display: inline-flex; align-items: center; }
        .qty-control button { border: none; background: none; padding: 5px 12px; font-weight: bold; }
        .summary-card { border: none; border-radius: 20px; background: #fff; position: sticky; top: 100px; }
        .btn-checkout { background: var(--brand-red); color: white; border: none; padding: 15px; border-radius: 50px; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-checkout:hover { background: #8e2a2a; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">IVALIN</a>
        <a href="index.html" class="text-dark text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Shop</a>
    </div>
</nav>

<div class="container py-5">
    <h2 class="fw-bold mb-4">Shopping Cart</h2>
    
    <div class="row g-4">
        <div class="col-lg-8">
            <div id="cartItemsList">
                </div>
        </div>

        <div class="col-lg-4">
            <div class="card summary-card shadow-sm p-4">
                <h4 class="mb-4">Order Summary</h4>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Subtotal</span>
                    <span id="subtotal" class="fw-bold">₹0</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span class="text-muted">Shipping</span>
                    <span class="text-success fw-bold">FREE</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between mb-4">
                    <span class="fs-5 fw-bold">Grand Total</span>
                    <span id="grandTotal" class="fs-4 fw-bold text-danger">₹0</span>
                </div>
                <button class="btn-checkout shadow" onclick="proceedToCheckout()">PROCEED TO CHECKOUT</button>
                <p class="text-center text-muted small mt-3">Secure SSL Encrypted Payment</p>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Load data from LocalStorage
    function renderCart() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        const container = document.getElementById("cartItemsList");
        let total = 0;

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5 bg-white rounded-4 shadow-sm">
                    <i class="bi bi-cart-x display-1 text-muted"></i>
                    <h3 class="mt-3">Your cart is empty</h3>
                    <p class="text-muted">Looks like you haven't added anything yet.</p>
                    <a href="index.html" class="btn btn-outline-danger px-4 rounded-pill">Start Shopping</a>
                </div>`;
            updateSummary(0);
            return;
        }

        container.innerHTML = ""; // Clear existing UI

        cart.forEach((item, index) => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;

            container.innerHTML += `
                <div class="card cart-card shadow-sm mb-3 p-3">
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <img src="${item.img}" class="cart-img" alt="${item.name}">
                        </div>
                        <div class="col">
                            <h5 class="mb-1 fw-bold text-truncate" style="max-width: 250px;">${item.name}</h5>
                            <p class="text-muted small mb-2">Size: <span class="badge bg-light text-dark border">${item.size}</span></p>
                            <div class="d-flex align-items-center gap-3">
                                <div class="qty-control border">
                                    <button onclick="updateQty(${index}, -1)">-</button>
                                    <span class="px-2">${item.qty}</span>
                                    <button onclick="updateQty(${index}, 1)">+</button>
                                </div>
                                <button class="btn btn-sm text-danger border-0" onclick="removeItem(${index})">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-auto text-end">
                            <div class="price-text fs-5">₹${itemTotal}</div>
                            <small class="text-muted">₹${item.price} each</small>
                        </div>
                    </div>
                </div>
            `;
        });

        updateSummary(total);
    }

    // 2. Update Quantities
    function updateQty(index, change) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        cart[index].qty += change;
        if (cart[index].qty < 1) cart[index].qty = 1;
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
          updateCartCount(); 

    }

    // 3. Remove Item
    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem("cart"));
        cart.splice(index, 1);
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
          updateCartCount();

    }

    // 4. Update Summary totals
    function updateSummary(total) {
        document.getElementById("subtotal").innerText = "₹" + total;
        document.getElementById("grandTotal").innerText = "₹" + total;
    }

    function proceedToCheckout() {
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        if(cart.length > 0) {
            alert("Redirecting to payment gateway...");
        } else {
            alert("Please add items to your cart first.");
        }
    }

    // Initialize on page load
    window.onload = renderCart;
    function proceedToCheckout() {
    window.location.href = "checkout.html";
}
</script>
<script>
  function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = 0;

    cart.forEach(item => total += item.qty);

    const badge = document.getElementById("cartCount");
    if (badge) {
      badge.innerText = total;
      badge.style.display = total > 0 ? "inline-block" : "none";
    }
  }

  updateCartCount(); // page load
</script>

</body>
</html>
