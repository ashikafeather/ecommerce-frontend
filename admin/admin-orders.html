<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: "Poppins", sans-serif; }
    .sidebar { width: 250px; min-height: 100vh; background: #343a40; color: #fff; }
    .sidebar .nav-link { color: #adb5bd; padding: 10px 15px; border-radius: 5px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #495057; color: #fff; }
    .flex-grow-1 { background: #f4f6f9; }
    .table th, .table td { vertical-align: middle; }
    .invoice-box { background: #fff; padding: 20px; border-radius: 10px; }
    .invoice-header h4 { margin: 0 0 10px; }
    .table td, .table th { vertical-align: middle; }
  </style>
</head>
<body>
<div class="d-flex">
   <nav class="sidebar p-3">
    <h4 class="text-center">Admin</h4>
    <ul class="nav flex-column mt-4">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#productsSubmenu" aria-expanded="false">
          <i class="bi bi-box-seam"></i> Products <i class="bi bi-caret-down-fill float-end"></i>
        </a>
        <div class="collapse" id="productsSubmenu">
          <ul class="nav flex-column ms-3">
            <li class="nav-item"><a class="nav-link" href="add-product.html">Add Product</a></li>
            <li class="nav-item"><a class="nav-link" href="manage-products.html">Manage Products</a></li>
          </ul>
        </div>
      </li>
      <li class="nav-item"><a class="nav-link" href="admin-orders.html"><i class="bi bi-cart-check"></i> Orders</a></li>
       <li class="nav-item"><a class="nav-link active" href="admin-users.html"><i class="bi bi-people"></i> Users</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="admin-login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>

  <div class="flex-grow-1 p-4">
    <h2 class="mb-4">Manage Orders</h2>
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTable">
          <tr><td colspan="7" class="text-center">No orders found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Order Details Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="orderDetails"></div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const ordersTable = document.getElementById("ordersTable");

// Load all orders
function loadOrders() {
  fetch("http://localhost:8080/api/orders")
    .then(res => res.json())
    .then(data => {
      ordersTable.innerHTML = "";

      if (!Array.isArray(data) || data.length === 0) {
        ordersTable.innerHTML = `<tr><td colspan="7" class="text-center">No orders found</td></tr>`;
        return;
      }

      data.forEach((order, index) => {
        let formattedDate = order.orderDate ? new Date(order.orderDate).toLocaleString() : "-";
        ordersTable.innerHTML += `
          <tr>
            <td>${index + 1}</td>
            <td>${order.id}</td>
            <td>${order.customerName || "-"}</td>
            <td>₹${order.total || 0}</td>
            <td>${order.status || "Processing"}</td>
            <td>${formattedDate}</td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="viewOrder(${order.id})">View</button>
            </td>
          </tr>
        `;
      });
    })
    .catch(err => {
      console.error("Fetch error:", err);
      ordersTable.innerHTML = `<tr><td colspan="7">Error loading orders</td></tr>`;
    });
}

// Show order in modal
function viewOrder(id) {
  fetch("http://localhost:8080/api/orders/" + id)
    .then(res => res.json())
    .then(order => {
      let itemsHTML = "";
      let total = 0;

      order.items.forEach((item, idx) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;

        // Display name, type, size, qty, price, total
      itemsHTML += `
  <tr>
    <td>${idx + 1}</td>
    <td>${item.productName || "No Name"}</td>
    <td>${item.size || "-"}</td>
    <td>${item.qty}</td>
    <td>₹${item.price.toFixed(2)}</td>
    <td>₹${itemTotal.toFixed(2)}</td>
  </tr>
`;
      });

      document.getElementById("orderDetails").innerHTML = `
        <div class="invoice-box">
          <div class="invoice-header">
            <h4>Order #${order.id}</h4>
            <p>Date: ${new Date(order.orderDate).toLocaleString()}</p>
          </div>
          <div class="customer-info mb-3">
            <h6>Customer Information</h6>
            <p>${order.customerName}</p>
            <p>${order.email || "-"}</p>
            <p>${order.address}, ${order.city || "-"}</p>
          </div>
          <div class="order-items">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Product</th>
                  <th>Size</th>
                  <th>Qty</th>
                  <th>Price</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>
                ${itemsHTML}
              </tbody>
              <tfoot>
                <tr>
                  <th colspan="5" class="text-end">Grand Total:</th>
                  <th>₹${total.toFixed(2)}</th>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      `;

      const orderModal = new bootstrap.Modal(document.getElementById('orderModal'));
      orderModal.show();
    })
    .catch(err => {
      console.error("Error fetching order:", err);
      document.getElementById("orderDetails").innerHTML = "<p class='text-danger'>Failed to load order details.</p>";
    });
}

loadOrders();
</script>
</body>
</html>
