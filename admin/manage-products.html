<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Products - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  body {
    background: #f4f6f9;
    font-family: "Poppins", sans-serif;
  }

  .sidebar {
    width: 250px;
    min-height: 100vh;
    background: #343a40;
    color: #fff;
  }

  .sidebar .nav-link {
    color: #adb5bd;
    padding: 10px 15px;
    border-radius: 5px;
  }

  .sidebar .nav-link:hover,
  .sidebar .nav-link.active {
    background: #495057;
    color: #fff;
  }

  .sidebar h4 {
    font-weight: 600;
  }

  .flex-grow-1 {
    background: #f4f6f9;
  }

  .table th,
  .table td {
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="d-flex">
   <nav class="sidebar p-3">
    <h4 class="text-center">Admin</h4>
    <ul class="nav flex-column mt-4">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item">
        <a class="nav-link active" href="#" data-bs-toggle="collapse" data-bs-target="#productsSubmenu" aria-expanded="true">
          <i class="bi bi-box-seam"></i> Products <i class="bi bi-caret-down-fill float-end"></i>
        </a>
        <div class="collapse show" id="productsSubmenu">
          <ul class="nav flex-column ms-3">
            <li class="nav-item"><a class="nav-link active" href="add-product.html">Add Product</a></li>
            <li class="nav-item"><a class="nav-link" href="manage-products.html">Manage Products</a></li>
          </ul>
        </div>
      </li>
      <li class="nav-item"><a class="nav-link" href="admin-orders.html"><i class="bi bi-cart-check"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="bi bi-people"></i> Users</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="admin-login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>
 
  <div class="flex-grow-1 p-4">
    <h2 class="mb-4">Manage Products</h2>
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="productsTable">
          <tr><td colspan="7" class="text-center">No products available</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- EDIT PRODUCT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Edit Product</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="editId">

        <div class="mb-3">
          <label class="form-label">Product Name</label>
          <input type="text" id="editName" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Price</label>
          <input type="number" id="editPrice" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Stock</label>
          <input type="number" id="editStock" class="form-control">
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="updateProduct()">Update</button>
      </div>

    </div>
  </div>
</div>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const productsTable = document.getElementById('productsTable');

async function loadProducts() {
  try {
    const response = await fetch("http://localhost:8080/api/products");
    const products = await response.json();

    if (products.length === 0) {
      productsTable.innerHTML = `<tr><td colspan="7">No products available</td></tr>`;
      return;
    }

    let rows = "";

    products.forEach((p, index) => {
      rows += `
        <tr>
          <td>${index + 1}</td>
          <td>${p.name}</td>
          <td>${p.mainCategory} ${p.subCategory ? "- " + p.subCategory : ""}</td>
          <td>₹${p.price}</td>
          <td>${p.stock}</td>
          <td>Active</td>
          <td>
            <button class="btn btn-sm btn-warning" onclick="openEdit(${p.id})">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `;
    });

    productsTable.innerHTML = rows;

  } catch (error) {
    console.error(error);
    productsTable.innerHTML = `
      <tr>
        <td colspan="7" class="text-danger text-center">
          Error loading products
        </td>
      </tr>
    `;
  }
}

loadProducts();
</script>
<script>
async function deleteProduct(id) {

  if (!confirm("Are you sure to delete this product?")) return;

  try {
    const res = await fetch(`http://localhost:8080/api/products/${id}`, {
      method: "DELETE"
    });

    if (res.ok) {
      alert("Deleted successfully");
      loadProducts(); // refresh
    } else {
      alert("Delete failed");
    }

  } catch (err) {
    console.error(err);
    alert("Error deleting product");
  }
}
</script>
<script>
async function openEdit(id){

  try {
    const res = await fetch(`http://localhost:8080/api/products/${id}`);
    const product = await res.json();

    document.getElementById("editId").value = product.id;
    document.getElementById("editName").value = product.name;
    document.getElementById("editPrice").value = product.price;
    document.getElementById("editStock").value = product.stock;

    const modal = new bootstrap.Modal(document.getElementById("editModal"));
    modal.show();

  } catch (err) {
    console.error(err);
    alert("Error loading product");
  }
}
</script>
<script>
async function updateProduct(){

  const id = document.getElementById("editId").value;

  const updatedProduct = {
    name: document.getElementById("editName").value,
    price: document.getElementById("editPrice").value,
    stock: document.getElementById("editStock").value
  };

  try {
    const res = await fetch(`http://localhost:8080/api/products/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(updatedProduct)
    });

    if(res.ok){
      alert("Updated Successfully");

      bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();

      loadProducts(); // refresh table
    } else {
      alert("Update failed");
    }

  } catch (err) {
    console.error(err);
    alert("Error updating product");
  }
}
</script>
</body>
</html>
