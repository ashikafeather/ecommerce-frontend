<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .invoice-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .invoice-header {
      margin-bottom: 20px;
    }
    .invoice-header h2 {
      margin: 0;
    }
    .table th, .table td {
      vertical-align: middle;
    }
    .text-right {
      text-align: right;
    }
  </style>
</head>
<body>

<div class="invoice-box">
  <div class="invoice-header">
    <h2>Order Details</h2>
    <p id="orderNumber"></p>
    <p id="orderDate"></p>
  </div>

  <div class="customer-info mb-4">
    <h5>Customer Information</h5>
    <p id="customerName"></p>
    <p id="customerEmail"></p>
    <p id="customerAddress"></p>
  </div>

  <div class="order-items">
    <h5>Products</h5>
    <div class="table-responsive">
      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Product</th>
            <th>Size</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="orderItems"></tbody>
        <tfoot>
          <tr>
            <th colspan="5" class="text-right">Grand Total:</th>
            <th id="grandTotal">₹0</th>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>

  <div class="text-end mt-4">
    <button class="btn btn-success" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
  </div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");
const orderItemsEl = document.getElementById("orderItems");
const grandTotalEl = document.getElementById("grandTotal");

fetch("http://localhost:8080/api/orders/" + id)
  .then(res => res.json())
  .then(order => {
    
    // Set order header info
    document.getElementById("orderNumber").innerText = "Order ID: #" + order.id;
    document.getElementById("orderDate").innerText = "Date: " + new Date(order.orderDate).toLocaleString();

    // Set customer info
    document.getElementById("customerName").innerText = order.customerName || "-";
    document.getElementById("customerEmail").innerText = order.email || "-";
    document.getElementById("customerAddress").innerText = order.address + ", " + (order.city || "-");

    // Populate items
    let total = 0;
    order.items.forEach((item, index) => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;

      orderItemsEl.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${item.productName}</td>
          <td>${item.size || "-"}</td>
          <td>${item.qty}</td>
          <td>₹${item.price.toFixed(2)}</td>
          <td>₹${itemTotal.toFixed(2)}</td>
        </tr>
      `;
    });

    grandTotalEl.innerText = "₹" + total.toFixed(2);
  })
  .catch(err => {
    console.error("Error fetching order:", err);
    document.querySelector(".invoice-box").innerHTML = "<p class='text-danger'>Error loading order details.</p>";
  });
</script>

</body>
</html>
