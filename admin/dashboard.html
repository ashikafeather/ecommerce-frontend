<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - IVALIN Style</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; font-family: "Poppins", sans-serif; }
    .sidebar { width: 250px; min-height: 100vh; background: #343a40; color: #fff; }
    .sidebar .nav-link { color: #adb5bd; padding: 10px 15px; border-radius: 5px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #495057; color: #fff; }
    .flex-grow-1 { background: #f4f6f9; }
    .card-stats .card-body { display: flex; align-items: center; justify-content: space-between; }
    .invoice-box { background: #fff; padding: 20px; border-radius: 10px; }
    .table th, .table td { vertical-align: middle; }
  </style>
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar p-3">
    <h4 class="text-center">Admin</h4>
    <ul class="nav flex-column mt-4">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#productsSubmenu" aria-expanded="false">
          <i class="bi bi-box-seam"></i> Products <i class="bi bi-caret-down-fill float-end"></i>
        </a>
        <div class="collapse" id="productsSubmenu">
          <ul class="nav flex-column ms-3">
            <li class="nav-item"><a class="nav-link" href="add-product.html">Add Product</a></li>
            <li class="nav-item"><a class="nav-link" href="manage-products.html">Manage Products</a></li>
          </ul>
        </div>
      </li>
      <li class="nav-item"><a class="nav-link" href="admin-orders.html"><i class="bi bi-cart-check"></i> Orders</a></li>
       <li class="nav-item"><a class="nav-link active" href="admin-users.html"><i class="bi bi-people"></i> Users</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="admin-login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>

  <!-- Main content -->
  <div class="flex-grow-1 p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">Dashboard</h2>
      <button class="btn btn-outline-secondary btn-sm" id="refreshStats"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>

    <!-- Stats cards -->
    <div class="row mb-4">
      <div class="col-md-3">
        <div class="card card-stats shadow-sm">
          <div class="card-body">
            <div>
              <h5>Total Orders</h5>
              <h3 id="statOrders">0</h3>
            </div>
            <i class="bi bi-cart-fill fs-1 text-primary"></i>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stats shadow-sm">
          <div class="card-body">
            <div>
              <h5>Products</h5>
              <h3 id="statProducts">0</h3>
            </div>
            <i class="bi bi-box-seam fs-1 text-success"></i>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stats shadow-sm">
          <div class="card-body">
            <div>
              <h5>Customers</h5>
              <h3 id="statUsers">0</h3>
            </div>
            <i class="bi bi-people fs-1 text-warning"></i>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card card-stats shadow-sm">
          <div class="card-body">
            <div>
              <h5>Revenue</h5>
              <h3 id="statRevenue">₹0</h3>
            </div>
            <i class="bi bi-currency-rupee fs-1 text-danger"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent orders table -->
    <div class="card shadow-sm">
      <div class="card-header">Recent Orders</div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Status</th>
              <th>Total</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTable">
            <tr><td colspan="7" class="text-center">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Order Details Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="orderDetails"></div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadDashboard() {
  try {
    // Fetch all orders, products, users
    const [ordersRes, productsRes, usersRes] = await Promise.all([
      fetch("http://localhost:8080/api/orders"),
      fetch("http://localhost:8080/api/products"),
      fetch("http://localhost:8080/api/users")
    ]);

    const [orders, products, users] = await Promise.all([
      ordersRes.json(),
      productsRes.json(),
      usersRes.json()
    ]);

    // Stats
    document.getElementById("statOrders").innerText = orders.length;
    document.getElementById("statProducts").innerText = products.length;
    document.getElementById("statUsers").innerText = users.length;

    // Revenue
    let revenue = 0;
    orders.forEach(o => {
      if (o.items) {
        revenue += o.items.reduce((sum, item) => sum + item.price * item.qty, 0);
      }
    });
    document.getElementById("statRevenue").innerText = `₹${revenue.toFixed(2)}`;

    // Recent 5 orders
    orders.sort((a,b) => new Date(b.orderDate) - new Date(a.orderDate));
    const recentOrders = orders.slice(0,5);
    const ordersTable = document.getElementById("ordersTable");
    ordersTable.innerHTML = "";

    if(recentOrders.length === 0) {
      ordersTable.innerHTML = `<tr><td colspan="7" class="text-center">No orders yet</td></tr>`;
    } else {
      recentOrders.forEach((order, index) => {
        let formattedDate = order.orderDate ? new Date(order.orderDate).toLocaleString() : "-";
        ordersTable.innerHTML += `
          <tr>
            <td>${index+1}</td>
            <td>${order.id}</td>
            <td>${order.customerName || "-"}</td>
            <td>${order.status || "Processing"}</td>
            <td>₹${order.items ? order.items.reduce((sum,i)=>sum+i.price*i.qty,0).toFixed(2) : 0}</td>
            <td>${formattedDate}</td>
            <td><button class="btn btn-sm btn-primary" onclick="viewOrder(${order.id})">View</button></td>
          </tr>
        `;
      });
    }

  } catch(e) {
    console.error("Error loading dashboard:", e);
  }
}

// View order modal
function viewOrder(id) {
  fetch(`http://localhost:8080/api/orders/${id}`)
    .then(res => res.json())
    .then(order => {
      let itemsHTML = "";
      let total = 0;
      order.items.forEach((item, idx) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        itemsHTML += `
          <tr>
            <td>${idx+1}</td>
            <td>${item.name} ${item.type ? '('+item.type+')' : ''}</td>
            <td>${item.size || '-'}</td>
            <td>${item.qty}</td>
            <td>₹${item.price.toFixed(2)}</td>
            <td>₹${itemTotal.toFixed(2)}</td>
          </tr>
        `;
      });

      document.getElementById("orderDetails").innerHTML = `
        <div class="invoice-box">
          <div class="invoice-header mb-3">
            <h4>Order #${order.id}</h4>
            <p>Date: ${new Date(order.orderDate).toLocaleString()}</p>
          </div>
          <div class="customer-info mb-3">
            <h6>Customer Information</h6>
            <p>${order.customerName}</p>
            <p>${order.email || '-'}</p>
            <p>${order.address}, ${order.city || '-'}</p>
          </div>
          <div class="order-items">
            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th>Product</th>
                  <th>Size</th>
                  <th>Qty</th>
                  <th>Price</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody>${itemsHTML}</tbody>
              <tfoot>
                <tr>
                  <th colspan="5" class="text-end">Grand Total:</th>
                  <th>₹${total.toFixed(2)}</th>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      `;

      new bootstrap.Modal(document.getElementById('orderModal')).show();
    });
}

// Load dashboard on page load
loadDashboard();

// Refresh button
document.getElementById('refreshStats').addEventListener('click', loadDashboard);
</script>
</body>
</html>
