<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  body {
    background: #f4f6f9;
    font-family: "Poppins", sans-serif;
  }

  .sidebar {
    width: 250px;
    min-height: 100vh;
    background: #343a40;
    color: #fff;
  }

  .sidebar .nav-link {
    color: #adb5bd;
    padding: 10px 15px;
    border-radius: 5px;
  }

  .sidebar .nav-link:hover,
  .sidebar .nav-link.active {
    background: #495057;
    color: #fff;
  }

  .sidebar h4 {
    font-weight: 600;
  }

  .flex-grow-1 {
    background: #f4f6f9;
  }

  .table th,
  .table td {
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar p-3">
    <h4 class="text-center">Admin</h4>
    <ul class="nav flex-column mt-4">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item">
        <a class="nav-link active" href="#" data-bs-toggle="collapse" data-bs-target="#productsSubmenu" aria-expanded="true">
          <i class="bi bi-box-seam"></i> Products <i class="bi bi-caret-down-fill float-end"></i>
        </a>
        <div class="collapse show" id="productsSubmenu">
          <ul class="nav flex-column ms-3">
            <li class="nav-item"><a class="nav-link active" href="add-product.html">Add Product</a></li>
            <li class="nav-item"><a class="nav-link" href="manage-products.html">Manage Products</a></li>
          </ul>
        </div>
      </li>
      <li class="nav-item"><a class="nav-link" href="admin-orders.html"><i class="bi bi-cart-check"></i> Orders</a></li>
      <li class="nav-item"><a class="nav-link" href="admin-users.html"><i class="bi bi-people"></i> Users</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="admin-login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>
  <div class="flex-grow-1 p-4">
    <h2 class="mb-4">Add New Dress Product</h2>
    <div class="card form-section shadow-sm">
      <div class="card-body">
        <form id="addProductForm">
          <div class="mb-3">
            <label for="name" class="form-label">Product Name</label>
            <input type="text" class="form-control" id="name" name="name" required>
          </div>
         <div class="mb-3">
  <label class="form-label">Main Category</label>
  <select id="mainCategory" name="mainCategory" class="form-select" onchange="updateSubCategory()" required>
  <option value="">Select Category</option>
  <option value="half-saree">Half Saree</option>
  <option value="saree">Saree</option>
  <option value="salwar">Salwar</option>
  <option value="kids">Kids</option>
</select>
</div>

<div class="mb-3" id="subCategoryDiv">
  <label class="form-label">Sub Category</label>
  <select id="subCategory" name="subCategory" class="form-select">
  </select>
</div>
            <label for="price" class="form-label">Price</label>
            <input type="number" class="form-control" id="price" name="price" step="0.01" required>
          </div>
          <div class="mb-3">
            <label for="stock" class="form-label">Stock Quantity</label>
            <input type="number" class="form-control" id="stock" name="stock" required>
          </div>
          <div class="mb-3">
            <label for="imageFile" class="form-label">Product Image</label>
            <input type="file" accept="image/*" class="form-control" id="imageFile" name="imageFile" required>
            <img id="imagePreview" src="#" alt="preview" class="img-fluid mt-2 d-none" style="max-height:200px;" />
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </form>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

function updateSubCategory(){

const main = document.getElementById("mainCategory").value
const sub = document.getElementById("subCategory")
const subDiv = document.getElementById("subCategoryDiv")

sub.innerHTML=""

let options=[]

if(main==="half-saree"){
options=[
"designer",
"wedding",
"traditional",
"party",
"festival",
"casual"
]
}

else if(main==="kids"){
options=[
"boys",
"girls",
"baby",
"toys"
]
}

/* Saree & Salwar -> No Subcategory */
else if(main==="saree" || main==="salwar"){

subDiv.style.display="none"

/* important */
sub.innerHTML = `<option value="none">No Subcategory</option>`

return
}

subDiv.style.display="block"

options.forEach(function(item){

let option=document.createElement("option")

option.value=item
option.textContent=item.charAt(0).toUpperCase()+item.slice(1)

sub.appendChild(option)

})

}

</script>
<script>
  
// Image preview
document.getElementById('imageFile').addEventListener('change', function() {
  const preview = document.getElementById('imagePreview');
  const file = this.files[0];

  if (file) {
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('d-none');
  } else {
    preview.classList.add('d-none');
  }
});

// Form submit → Save to DB
document.getElementById('addProductForm').addEventListener('submit', function(e){
  e.preventDefault();

  const form = document.getElementById('addProductForm');
  const formData = new FormData(form);

  fetch("http://localhost:8080/api/products", {
    method: "POST",
    body: formData
  })
  .then(res => {
    if (!res.ok) {
      throw new Error("Server error");
    }
    return res.json();
  })
  .then(data => {
    alert("Product saved successfully!");
    form.reset();
    document.getElementById('imagePreview').classList.add('d-none');
  })
  .catch(err => {
    console.error("Error:", err);
    alert("Error saving product");
  });
});
</script>
</body>
</html>
