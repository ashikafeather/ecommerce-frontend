<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
  body {
    background: #f4f6f9;
    font-family: "Poppins", sans-serif;
  }

  .sidebar {
    width: 250px;
    min-height: 100vh;
    background: #343a40;
    color: #fff;
  }

  .sidebar .nav-link {
    color: #adb5bd;
    padding: 10px 15px;
    border-radius: 5px;
  }

  .sidebar .nav-link:hover,
  .sidebar .nav-link.active {
    background: #495057;
    color: #fff;
  }

  .sidebar h4 {
    font-weight: 600;
  }

  .flex-grow-1 {
    background: #f4f6f9;
  }

  .table th,
  .table td {
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="d-flex">
  <nav class="sidebar p-3">
    <h4 class="text-center">Admin</h4>
    <ul class="nav flex-column mt-4">
      <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item">
        <a class="nav-link" href="#" data-bs-toggle="collapse" data-bs-target="#productsSubmenu" aria-expanded="false">
          <i class="bi bi-box-seam"></i> Products <i class="bi bi-caret-down-fill float-end"></i>
        </a>
        <div class="collapse" id="productsSubmenu">
          <ul class="nav flex-column ms-3">
            <li class="nav-item"><a class="nav-link" href="add-product.html">Add Product</a></li>
            <li class="nav-item"><a class="nav-link" href="manage-products.html">Manage Products</a></li>
          </ul>
        </div>
      </li>
      <li class="nav-item"><a class="nav-link" href="admin-orders.html"><i class="bi bi-cart-check"></i> Orders</a></li>
       <li class="nav-item"><a class="nav-link active" href="admin-users.html"><i class="bi bi-people"></i> Users</a></li>
      <li class="nav-item mt-3"><a class="nav-link" href="admin-login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
    </ul>
  </nav>
  <div class="flex-grow-1 p-4">
    <h2 class="mb-4">Manage Users</h2>
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr><td colspan="6" class="text-center">No users found</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// sample load
const usersTable = document.getElementById('usersTable');

async function loadUsers() {
  try {
    const response = await fetch("http://localhost:8080/api/users");
    const users = await response.json();

    if (users.length === 0) {
      usersTable.innerHTML = `<tr><td colspan="6" class="text-center">No users found</td></tr>`;
      return;
    }

    let rows = "";

    users.forEach((user, index) => {
      rows += `
        <tr>
          <td>${index + 1}</td>
          <td>${user.fullName}</td>
          <td>${user.email}</td>
          <td>Customer</td>
          <td>Active</td>
          <td>
            <button class="btn btn-sm btn-warning">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Delete</button>
          </td>
        </tr>
      `;
    });

    usersTable.innerHTML = rows;

  } catch (error) {
    console.error(error);
    usersTable.innerHTML = `<tr><td colspan="6" class="text-danger text-center">Error loading users</td></tr>`;
  }
}

loadUsers();
</script>
</body>
</html>
