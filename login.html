<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - IVALIN Style</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* ================= LOGIN PAGE STYLES ================= */
    
    body.login-page {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Poppins", sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      text-align: center;
      color: white;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 0;
    }

    .login-logo {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .login-body {
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      display: block;
      font-size: 14px;
    }

    .form-control {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      transition: all 0.3s ease;
      background-color: #f8f9fa;
    }

    .form-control:focus {
      border-color: #667eea;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      outline: none;
    }

    .form-control::placeholder {
      color: #999;
    }

    .password-toggle {
      cursor: pointer;
      color: #667eea;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #764ba2;
    }

    .input-group-text {
      border: 2px solid #e0e0e0;
      border-left: none;
      background-color: #f8f9fa;
      border-radius: 0 10px 10px 0;
    }

    .form-check {
      margin-bottom: 20px;
    }

    .form-check-input {
      width: 18px;
      height: 18px;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .form-check-input:checked {
      background-color: #667eea;
      border-color: #667eea;
    }

    .form-check-label {
      margin-bottom: 0;
      font-size: 14px;
      color: #555;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 20px;
    }

    .forgot-password a {
      font-size: 14px;
      color: #667eea;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      gap: 10px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background-color: #e0e0e0;
    }

    .divider span {
      color: #999;
      font-size: 13px;
      font-weight: 600;
    }

    .social-login {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .social-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background-color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .social-btn:hover {
      border-color: #667eea;
      background-color: #f8f9ff;
      transform: translateY(-2px);
    }

    .signup-section {
      text-align: center;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
    }

    .signup-section p {
      color: #555;
      font-size: 14px;
      margin-bottom: 0;
    }

    .signup-section a {
      color: #667eea;
      font-weight: 700;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .signup-section a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    /* Form Validation Styles */
    .form-control.is-invalid {
      border-color: #dc3545;
      background-image: none;
    }

    .form-control.is-invalid:focus {
      border-color: #dc3545;
      box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
    }

    .invalid-feedback {
      display: block;
      color: #dc3545;
      font-size: 12px;
      margin-top: 6px;
      font-weight: 500;
    }

    .form-control.is-valid {
      border-color: #28a745;
      background-image: none;
    }

    .form-control.is-valid:focus {
      border-color: #28a745;
      box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
    }

    /* Loading State */
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-login.loading {
      position: relative;
      color: transparent;
    }

    .btn-login.loading::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      top: 50%;
      left: 50%;
      margin-left: -8px;
      margin-top: -8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive Design */
    @media (max-width: 576px) {
      .login-container {
        padding: 15px;
      }

      .login-body {
        padding: 30px 20px;
      }

      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .form-control {
        font-size: 16px; /* Prevents zoom on iOS */
      }

      .social-login {
        flex-direction: column;
      }

      .social-btn {
        width: 100%;
      }
    }

    /* Dark Mode Support (Optional) */
    @media (prefers-color-scheme: dark) {
      .login-card {
        background-color: #1e1e1e;
      }

      .form-control {
        background-color: #2a2a2a;
        color: white;
        border-color: #444;
      }

      .form-control:focus {
        background-color: #333;
        border-color: #667eea;
      }

      .form-label,
      .form-check-label {
        color: #e0e0e0;
      }

      .signup-section {
        border-top-color: #444;
      }

      .divider::before,
      .divider::after {
        background-color: #444;
      }

      .social-btn {
        background-color: #2a2a2a;
        border-color: #444;
        color: #e0e0e0;
      }

      .social-btn:hover {
        background-color: #333;
      }
    }
  </style>
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <i class="bi bi-bag-heart-fill"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to your IVALIN account</p>
      </div>

      <!-- Body -->
      <div class="login-body">
        <form id="loginForm" novalidate>
          <!-- Email Input -->
          <div class="form-group">
            <label for="email" class="form-label">
              <i class="bi bi-envelope"></i> Email Address
            </label>
            <input 
              type="email" 
              class="form-control" 
              id="email" 
              name="email"
              placeholder="you@example.com"
              required
            >
            <div class="invalid-feedback">Please enter a valid email address.</div>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password" class="form-label">
              <i class="bi bi-lock"></i> Password
            </label>
            <div class="input-group">
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                name="password"
                placeholder="Enter your password"
                required
              >
              <span class="input-group-text">
                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
              </span>
            </div>
            <div class="invalid-feedback">Password is required and must be at least 6 characters.</div>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="d-flex justify-content-between align-items-center" style="margin-bottom: 25px;">
            <div class="form-check">
              <input 
                class="form-check-input" 
                type="checkbox" 
                id="rememberMe" 
                name="rememberMe"
              >
              <label class="form-check-label" for="rememberMe">
                Remember me
              </label>
            </div>
            <div class="forgot-password">
              <a href="forgot-password.html">Forgot password?</a>
            </div>
          </div>

          <!-- Login Button -->
          <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="divider">
          <span>OR</span>
        </div>

        <!-- Social Login -->
        <div class="social-login">
          <a href="#google-login" class="social-btn" title="Sign in with Google">
            <i class="bi bi-google"></i>
          </a>
          <a href="#facebook-login" class="social-btn" title="Sign in with Facebook">
            <i class="bi bi-facebook"></i>
          </a>
          <a href="#twitter-login" class="social-btn" title="Sign in with Twitter">
            <i class="bi bi-twitter"></i>
          </a>
        </div>

        <!-- Sign Up Link -->
        <div class="signup-section">
          <p>Don't have an account? <a href="signup.html">Create one now</a></p>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

 <script>
// ================= PASSWORD TOGGLE =================
const togglePassword = document.getElementById('togglePassword');
const passwordInput = document.getElementById('password');

togglePassword.addEventListener('click', function() {
  const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
  passwordInput.setAttribute('type', type);
  this.classList.toggle('bi-eye');
  this.classList.toggle('bi-eye-slash');
});

// ================= LOGIN SUBMIT =================
const loginForm = document.getElementById('loginForm');

loginForm.addEventListener('submit', async function(e) {
  e.preventDefault();

  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const email = emailInput.value.trim();
  const password = passwordInput.value.trim();

  let isValid = true;
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  // Email validation
  if (!email || !emailRegex.test(email)) {
    emailInput.classList.add('is-invalid');
    isValid = false;
  } else {
    emailInput.classList.remove('is-invalid');
  }

  // Password validation
  if (!password || password.length < 6) {
    passwordInput.classList.add('is-invalid');
    isValid = false;
  } else {
    passwordInput.classList.remove('is-invalid');
  }

  if (!isValid) return;

  const submitBtn = this.querySelector('.btn-login');
  submitBtn.classList.add('loading');
  submitBtn.disabled = true;

  try {
    const response = await fetch("http://localhost:8080/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: email,
        password: password
      })
    });

    if (response.ok) {

      const data = await response.json();

      //  Save user details
      localStorage.setItem("userId", data.id);
      localStorage.setItem("userName", data.fullName);
      localStorage.setItem("userEmail", data.email);

      window.location.href = "index.html";

    } else {
      alert("Invalid email or password!");
    }

  } catch (error) {
    alert("Server error. Make sure backend is running.");
    console.error(error);
  }

  submitBtn.classList.remove('loading');
  submitBtn.disabled = false;
});

// ================= CLEAR VALIDATION =================
const inputs = document.querySelectorAll('.form-control');
inputs.forEach(input => {
  input.addEventListener('input', function() {
    this.classList.remove('is-invalid', 'is-valid');
  });
});

// ================= REMEMBER ME =================
const rememberMe = document.getElementById('rememberMe');
const emailInputRemember = document.getElementById('email');

window.addEventListener('load', function() {
  const savedEmail = localStorage.getItem('savedEmail');
  if (savedEmail) {
    emailInputRemember.value = savedEmail;
    rememberMe.checked = true;
  }
});

rememberMe.addEventListener('change', function() {
  if (this.checked) {
    localStorage.setItem('savedEmail', emailInputRemember.value);
  } else {
    localStorage.removeItem('savedEmail');
  }
});

emailInputRemember.addEventListener('input', function() {
  if (rememberMe.checked) {
    localStorage.setItem('savedEmail', this.value);
  }
});
</script>
</body>
</html>
