<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | IVALIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --brand-red: #b33939; }
        body { background-color: #fcfcfc; }
        .form-control:focus { border-color: var(--brand-red); box-shadow: 0 0 0 0.25rem rgba(179, 57, 57, 0.1); }
        .checkout-card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .btn-order { background: var(--brand-red); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; }
        .btn-order:hover { background: #8e2a2a; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">IVALIN</a>
        <span class="text-muted small"><i class="bi bi-shield-lock-fill"></i> Secure Checkout</span>
    </div>
</nav>

<div class="container mb-5">
    <div class="row g-5">
        <div class="col-md-7">
            <h4 class="mb-4 fw-bold">Shipping Information</h4>
            <form id="checkoutForm">
                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Doe" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Full Address</label>
                        <input type="text" class="form-control" placeholder="Door No, Street Name" required>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">State</label>
                        <select class="form-select" required>
                            <option value="">Choose...</option>
                            <option>Tamil Nadu</option>
                            <option>Karnataka</option>
                            <option>Kerala</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Zip Code</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>

                <hr class="my-4">

                <h4 class="mb-3 fw-bold">Payment Method</h4>
                <div class="my-3">
                    <div class="form-check">
                        <input id="cod" name="paymentMethod" type="radio" class="form-check-input" checked required>
                        <label class="form-check-label" for="cod">Cash on Delivery (COD)</label>
                    </div>
                    <div class="form-check">
                        <input id="online" name="paymentMethod" type="radio" class="form-check-input" required disabled>
                        <label class="form-check-label" for="online">Online Payment (Coming Soon)</label>
                    </div>
                </div>
            </form>
        </div>

        <div class="col-md-5">
            <div class="card checkout-card p-4">
                <h4 class="d-flex justify-content-between align-items-center mb-3">
                    <span class="text-muted">Order Summary</span>
                </h4>
                <ul class="list-group list-group-flush mb-3" id="summaryItems"></ul>

                <div class="list-group-item d-flex justify-content-between bg-light p-3 rounded">
                    <span class="fw-bold">Total (INR)</span>
                    <strong class="text-danger fs-4" id="finalAmount">₹0</strong>
                </div>

                <button class="btn-order mt-4 shadow" onclick="placeOrder()">PLACE ORDER NOW</button>
            </div>
        </div>
    </div>
</div>

<script>
function loadCheckoutSummary() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const summaryList = document.getElementById("summaryItems");
    let total = 0;

    summaryList.innerHTML = "";

    if (cart.length === 0) {
        window.location.href = "cart.html";
        return;
    }

    cart.forEach(item => {
        total += item.price * item.qty;

        summaryList.innerHTML += `
            <li class="list-group-item d-flex justify-content-between lh-sm border-0 px-0">
                <div>
                    <h6 class="my-0">${item.name}</h6>
                    <small class="text-muted">Qty: ${item.qty} | Size: ${item.size}</small>
                </div>
                <span class="text-muted">₹${item.price * item.qty}</span>
            </li>
        `;
    });

    document.getElementById("finalAmount").innerText = "₹" + total;
}

function placeOrder() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
    }

    const firstName = document.querySelector('input[placeholder="John"]').value.trim();
    const lastName = document.querySelector('input[placeholder="Doe"]').value.trim();
    const address = document.querySelector('input[placeholder="Door No, Street Name"]').value.trim();
    const city = document.querySelector('.col-md-5 input').value.trim();
    const state = document.querySelector('select').value;
    const zip = document.querySelector('.col-md-3 input').value.trim();

    if (!firstName || !lastName || !address || !city || !state || !zip) {
        alert("Please fill all shipping details properly.");
        return;
    }
const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

const orderData = {
    customerName: firstName + " " + lastName,
    address: address + ", " + city + ", " + state + " - " + zip,
    total: total, // ✅ Add this
    items: cart.map(item => ({
        productName: item.name,   
        price: item.price,
        qty: item.qty,
        size: item.size
    }))
};

    console.log("Sending Order:", orderData);

    fetch("http://localhost:8080/api/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(orderData)
    })
    .then(response => response.text())
    .then(data => {
        console.log("Server Response:", data);

        if (data === "success") {
            alert("Order placed successfully!");
            localStorage.removeItem("cart");
            window.location.href = "order-success.html";
        } else {
            alert("Order failed!");
        }
    })
    .catch(error => {
        console.error("Error:", error);
        alert("Server error!");
    });
}

window.onload = loadCheckoutSummary;
</script>
</body>
</html>
